            <nav class="navbar navbar-expand-lg bg-body-tertiary">

                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"

                            </li>

                    </div>
                </div>
            </nav>
        </header>

        <main class="form">
            <section id="formulario">
                <h1 class="sub">CONTACTO</h1>
                <form class="form-container" action="../pages/submit.html" method="get">
                    <div> 
                        <label for="">Nombre:</label>
                        <input type="text" name="nombre" id="nombre">
                    </div>

                    <div>
                        <label for="">Apellido:</label>
                        <input type="text" name="apellido" id="apellido">
                    </div> 
                
                    <div>
                        <label for="">Género:</label>
                        <input type="radio">
                        <label for="">Mujer</label>

                        <input type="radio">
                        <label for="">Hombre</label>

                        <input type="radio">
                        <label for="">Prefiero no decirlo</label>
                    </div>   
                    <div>
                        <label for="">Teléfono:</label>
                        <input type="tel" name="Teléfono" id="TELEFONO">
                    </div>
                    

                    <div>
                        <label for="">Correo Electrónico:</label>
                        <input type="text" name="correo" id="correo">
                    </div>

                    <div>
                        <label for="Consulta">Consulta:</label>
                        <select name="seleccionar" id="seleccionar">
                            <option value="">Quiero adoptar</option>
                            <option value="">Quiero apadrinar</option>
                            <option value="">Quiero donar</option>
                            <option value="">Quiero ser voluntario/a</option>
                        </select>
                    </div>
                    <div>
                        <label for="">Mensaje:</label>
                        <textarea name="mensaje" id="mensaje"></textarea>
                    </div>

                    <div>
                        <label for="suscribe">Suscribirse:</label>
                        <input type="checkbox" name="suscribe">
                    </div>

                    <div>
                        <input class="button" type="submit" value="Enviar">
                    </div>
                </form>
            </section>

            <section id="ubicacion">
                <h2 class="sub">¿Dónde nos encontramos?</h2>
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3272.608775634374!2d-58.43535412419859!3d-34.89116917285264!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x95bcd524123fd69d%3A0xc8636b72951eb39b!2sEl%20campito%20Refugio!5e0!3m2!1ses!2ses!4v1768772442476!5m2!1ses!2ses" width="450" height="200" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </section>
        </main>
